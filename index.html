    <title>منصة الإبداع في الرياضيات</title>

    <!-- Prevent white flash on dark theme -->
    <style>
      html,body{background:#080d1a;margin:0;padding:0}
      #root{min-height:100vh}
      #app-loader{
        position:fixed;inset:0;background:#080d1a;
        display:flex;align-items:center;justify-content:center;
        z-index:9999;
      }
      .loader-ring{
        width:44px;height:44px;
        border:3px solid rgba(212,175,55,0.15);
        border-top-color:#D4AF37;
        border-radius:50%;
        animation:spin .8s linear infinite;
      }
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="app-loader"><div class="loader-ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide loader after React mounts
      window.addEventListener('DOMContentLoaded', function() {
        var loader = document.getElementById('app-loader');
        if (!loader) return;
        setTimeout(function() {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s';
          setTimeout(function() { if (loader.parentNode) loader.parentNode.removeChild(loader); }, 350);
        }, 150);
      });

      // Register SW — vite-plugin-pwa (generateSW) يبني sw.js بدون ES modules
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) {
              // Check for updates every 30 min
              setInterval(function() { reg.update(); }, 30 * 60 * 1000);

              reg.addEventListener('updatefound', function() {
                var newWorker = reg.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch(function() {
              // SW registration failed — app still works, just without offline support
              console.warn('[PWA] Service Worker registration failed — running without SW');
            });

          // Reload once when new SW takes control
          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });

          // SW → App messages
          navigator.serviceWorker.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'ASSET_NOT_FOUND') {
              if ('caches' in window) {
                caches.keys().then(function(keys) {
                  return Promise.all(keys.map(function(k) { return caches.delete(k); }));
                }).then(function() { window.location.reload(); });
              } else {
                window.location.reload();
              }
            }
          });
        });
      }
    </script>
  </body>
